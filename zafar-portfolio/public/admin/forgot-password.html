<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — Admin</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-brand"><span class="knot"></span> Zafar Sheikh</div>
    <h1>Forgot Password</h1>
    <p class="sub">Enter your admin email — we'll send a reset link if it's registered.</p>

    <div class="alert alert-err" id="alertErr"></div>
    <div class="alert alert-ok" id="alertOk"></div>

    <form id="forgotForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="username">
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">Send reset link</button>
    </form>

    <p class="auth-links"><a href="/admin/login.html">← Back to login</a></p>
  </div>
</div>

<script>
  const form = document.getElementById('forgotForm');
  const alertErr = document.getElementById('alertErr');
  const alertOk = document.getElementById('alertOk');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    alertErr.classList.remove('show'); alertOk.classList.remove('show');
    submitBtn.disabled = true; submitBtn.textContent = 'Sending…';
    try {
      const res = await fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: document.getElementById('email').value.trim() })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Something went wrong.');
      alertOk.textContent = data.message;
      alertOk.classList.add('show');
      form.reset();
    } catch (err) {
      alertErr.textContent = err.message;
      alertErr.classList.add('show');
    } finally {
      submitBtn.disabled = false; submitBtn.textContent = 'Send reset link';
    }
  });
</script>
</body>
</html>
