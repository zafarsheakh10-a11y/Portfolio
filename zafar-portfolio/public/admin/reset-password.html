<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Admin</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-brand"><span class="knot"></span> Zafar Sheikh</div>
    <h1>Set a New Password</h1>
    <p class="sub">Choose a new password for your admin account.</p>

    <div class="alert alert-err" id="alertErr"></div>
    <div class="alert alert-ok" id="alertOk"></div>

    <form id="resetForm">
      <div class="field">
        <label for="newPassword">New password</label>
        <input type="password" id="newPassword" required minlength="8" autocomplete="new-password">
        <p class="hint">At least 8 characters.</p>
      </div>
      <div class="field">
        <label for="confirmPassword">Confirm password</label>
        <input type="password" id="confirmPassword" required minlength="8" autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">Reset password</button>
    </form>

    <p class="auth-links"><a href="/admin/login.html">← Back to login</a></p>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  const form = document.getElementById('resetForm');
  const alertErr = document.getElementById('alertErr');
  const alertOk = document.getElementById('alertOk');
  const submitBtn = document.getElementById('submitBtn');

  if (!token) {
    alertErr.textContent = 'This reset link is missing its token. Please request a new one.';
    alertErr.classList.add('show');
    submitBtn.disabled = true;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    alertErr.classList.remove('show'); alertOk.classList.remove('show');
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    if (newPassword !== confirmPassword) {
      alertErr.textContent = 'Passwords do not match.';
      alertErr.classList.add('show');
      return;
    }
    submitBtn.disabled = true; submitBtn.textContent = 'Resetting…';
    try {
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Something went wrong.');
      alertOk.textContent = data.message + ' Redirecting to login…';
      alertOk.classList.add('show');
      form.reset();
      setTimeout(() => window.location.href = '/admin/login.html', 1800);
    } catch (err) {
      alertErr.textContent = err.message;
      alertErr.classList.add('show');
      submitBtn.disabled = false; submitBtn.textContent = 'Reset password';
    }
  });
</script>
</body>
</html>
