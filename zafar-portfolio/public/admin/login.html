<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Zafar Sheikh Portfolio</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-brand"><span class="knot"></span> Zafar Sheikh</div>
    <h1>Admin Login</h1>
    <p class="sub">Sign in to manage your portfolio content.</p>

    <div class="alert alert-err" id="alertBox"></div>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="username">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">Log in</button>
    </form>

    <p class="auth-links">
      <a href="/admin/forgot-password.html">Forgot your password?</a><br><br>
      <a href="/">← Back to site</a>
    </p>
  </div>
</div>

<script>
  const form = document.getElementById('loginForm');
  const alertBox = document.getElementById('alertBox');
  const submitBtn = document.getElementById('submitBtn');

  // If already logged in, skip straight to dashboard.
  fetch('/api/auth/me').then(r => { if (r.ok) window.location.href = '/admin/'; });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    alertBox.classList.remove('show');
    submitBtn.disabled = true; submitBtn.textContent = 'Logging in…';
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Login failed.');
      window.location.href = '/admin/';
    } catch (err) {
      alertBox.textContent = err.message;
      alertBox.classList.add('show');
      submitBtn.disabled = false; submitBtn.textContent = 'Log in';
    }
  });
</script>
</body>
</html>
